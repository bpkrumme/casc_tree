---
controller_credential_types: 
  - name: "CUSTOM - IDM Operations Credential Type"
    description: |-
      {%- raw -%}
      Credential Type for interacting with Red Hat IDM
      {%- endraw -%}
    kind: "cloud"
    inputs:
        fields:
        - id: ipa_principal
          type: string
          label: IPA Admin Principal Username
        - id: ipa_principal_password
          type: string
          label: IPA Admin Principal Password
          secret: true
        - id: ipa_domain
          type: string
          label: IPA Domain
        required:
        - ipa_principal
        - ipa_principal_password
        - ipa_domain

    injectors:
        extra_vars:
          ipaclient_domain: "{%- raw -%} '{{ ipa_domain }}' {%- endraw -%}"
          ipaserver_domain: "{%- raw -%} '{{ ipa_domain }}' {%- endraw -%}"
          ipaadmin_password: "{%- raw -%} '{{ ipa_principal_password }}' {%- endraw -%}"
          ipaadmin_principal: "{%- raw -%} '{{ ipa_principal }}' {%- endraw -%}"

  - name: "CUSTOM - Insights API Operations"
    kind: "cloud"
    inputs:
        fields:
        - id: client_id
          type: string
          label: Insights Service Account Client ID
        - id: client_secret
          type: string
          label: Insights Service Account Client Secret
          secret: true
        required:
        - client_id
        - client_secret

    injectors:
        env:
          HCC_CLIENT_ID: "{%- raw -%} '{{ client_id }}' {%- endraw -%}"
          HCC_CLIENT_SECRET: "{%- raw -%} '{{ client_secret }}' {%- endraw -%}"

  - name: "CUSTOM - phpIPAM Credential Type"
    kind: "cloud"
    inputs:
        fields:
        - id: phpipam_url
          type: string
          label: phpIPAM URL
          help_text: Enter only the FQDN of the server with https:// prepended
        - id: phpipam_app_id
          type: string
          label: phpIPAM API App ID
        - id: phpipam_app_code
          type: string
          label: phpIPAM API App Code
          secret: true
        - id: phpipam_tls_verify
          type: boolean
          label: Skip TLS Verification?
        required:
        - phpipam_url
        - phpipam_api_id
        - phpipam_api_code
        - phpipam_tls_verify

    injectors:
        extra_vars:
          phpipam_url: "{%- raw -%} '{{ phpipam_url }}' {%- endraw -%}"
          phpipam_app_id: "{%- raw -%} '{{ phpipam_app_id }}' {%- endraw -%}"
          phpipam_app_code: "{%- raw -%} '{{ phpipam_app_code }}' {%- endraw -%}"
          phpipam_skip_tls_verify: "{%- raw -%} '{{ phpipam_tls_verify }}' {%- endraw -%}"

  - name: "CUSTOM - Satellite Ops Credential Type"
    description: |-
      {%- raw -%}
      Credential Type for interacting with Red Hat Satellite
      {%- endraw -%}
    kind: "cloud"
    inputs:
        fields:
        - id: server_fqdn
          type: string
          label: Satellite Server FQDN
          help_text: Enter only the FQDN of the server without https:// or http://
        - id: username
          type: string
          label: Username
        - id: password
          type: string
          label: Password
          secret: true
        required:
        - server_fqdn
        - username
        - password

    injectors:
        extra_vars:
          satellite_ops_password: "{%- raw -%} '{{ password }}' {%- endraw -%}"
          satellite_ops_username: "{%- raw -%} '{{ username }}' {%- endraw -%}"
          satellite_ops_server_url: "{%- raw -%} https://{{ server_fqdn }} {%- endraw -%}"
          satellite_ops_server_name: "{%- raw -%} '{{ server_fqdn }}' {%- endraw -%}"

  - name: "CUSTOM - Servicenow ITSM"
    description: |-
      {%- raw -%}
      Credential Type for interacting with Servicenow
      {%- endraw -%}
    kind: "cloud"
    inputs:
        fields:
        - id: instance
          type: string
          label: Instance
        - id: username
          type: string
          label: Username
        - id: password
          type: string
          label: Password
          secret: true
        required:
        - instance
        - username
        - password

    injectors:
        env:
          SN_HOST: "{%- raw -%} '{{ instance }}' {%- endraw -%}"
          SN_PASSWORD: "{%- raw -%} '{{ password }}' {%- endraw -%}"
          SN_USERNAME: "{%- raw -%} '{{ username }}' {%- endraw -%}"

  - name: "CUSTOM - Webhook Basic Auth"
    kind: "cloud"
    inputs:
        fields:
        - id: basic_webhook_url
          type: string
          label: URL to send the webhook to
          help_text: Enter in the form of a full URL including http:// or https://
        - id: username
          type: string
          label: Basic Auth Username
        - id: password
          type: string
          label: Basic Auth password
          secret: true
        required:
        - basic_webhook_url
        - username
        - password

    injectors:
        extra_vars:
          basic_webhook_url: "{%- raw -%} '{{ basic_webhook_url }}' {%- endraw -%}"
          basic_webhook_password: "{%- raw -%} '{{ password }}' {%- endraw -%}"
          basic_webhook_username: "{%- raw -%} '{{ username }}' {%- endraw -%}"

  - name: "IDM Operations Credential Type"
    kind: "cloud"
    inputs:
        fields:
        - id: ipa_principal
          type: string
          label: IPA Admin Principal Username
        - id: ipa_principal_password
          type: string
          label: IPA Admin Principal Password
          secret: true
        - id: ipa_domain
          type: string
          label: IPA Domain
        required:
        - ipa_principal
        - ipa_principal_password
        - ipa_domain

    injectors:
        extra_vars:
          ipaclient_domain: "{%- raw -%} '{{ ipa_domain }}' {%- endraw -%}"
          ipaserver_domain: "{%- raw -%} '{{ ipa_domain }}' {%- endraw -%}"
          ipaadmin_password: "{%- raw -%} '{{ ipa_principal_password }}' {%- endraw -%}"
          ipaadmin_principal: "{%- raw -%} '{{ ipa_principal }}' {%- endraw -%}"
...
