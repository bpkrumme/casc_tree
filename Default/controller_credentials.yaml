---
controller_credentials:
  - name: "CLOUD - Terraform EC2 Machine"
    credential_type: "Machine"
    organization: "Cloud Operations"
    inputs:
      username: ec2-user
      ssh_key_data: "{{ vaulted_controller_credentials_cloud___terraform_ec2_machine_ssh_key_data }}"
  - name: "CLOUD - Terraform AWS Access"
    credential_type: "Amazon Web Services"
    organization: "Cloud Operations"
    inputs:
      password: "{{ vaulted_controller_credentials_cloud___terraform_aws_access_password }}"
      username: AKIASA5EORM3IJZ2HUPJ
  - name: "Servicenow ITSM"
    credential_type: "CUSTOM - Servicenow ITSM"
    organization: "Default"
    inputs:
      instance: https://ven07619.service-now.com/
      password: "{{ vaulted_controller_credentials_servicenow_itsm_password }}"
      username: bklab_ansible
  - name: "IDM Operations Machine Credential"
    credential_type: "Machine"
    organization: "IDM Operations"
    inputs:
      password: "{{ vaulted_controller_credentials_idm_operations_machine_credential_password }}"
      username: admin
  - name: "IDM Operations Admin Credential"
    credential_type: "CUSTOM - IDM Operations Credential Type"
    organization: "IDM Operations"
    inputs:
      ipa_domain: bk.lab
      ipa_principal: admin
      ipa_principal_password: "{{ vaulted_controller_credentials_idm_operations_admin_credential_ipa_principal_password }}"
  - name: "phpIPAM Credential"
    credential_type: "CUSTOM - phpIPAM Credential Type"
    organization: "Network Operations"
    inputs:
      phpipam_url: https://ipam.bk.lab
      phpipam_app_id: ansible
      phpipam_app_code: "{{ vaulted_controller_credentials_phpipam_credential_phpipam_app_code }}"
      phpipam_tls_verify: True
  - name: "Satellite Ops Credential"
    credential_type: "CUSTOM - Satellite Ops Credential Type"
    organization: "Patching Operations"
    inputs:
      password: "{{ vaulted_controller_credentials_satellite_ops_credential_password }}"
      username: ansible_admin
      server_fqdn: satellite.bk.lab
  - name: "Satellite Inventory Credential"
    credential_type: "Red Hat Satellite 6"
    organization: "Patching Operations"
    inputs:
      host: https://satellite.bk.lab
      password: "{{ vaulted_controller_credentials_satellite_inventory_credential_password }}"
      username: ansibleinventory
  - name: "DANGER - root credential"
    credential_type: "Machine"
    organization: "Server Operations"
    inputs:
      password: "{{ vaulted_controller_credentials_danger___root_credential_password }}"
      username: root
  - name: "DAY1 - Linux Machine - No Domain"
    credential_type: "Machine"
    organization: "Server Operations"
    inputs:
      username: cloud-user
      ssh_key_data: "{{ vaulted_controller_credentials_day1___linux_machine___no_domain_ssh_key_data }}"
  - name: "DAY2 - Linux Machine - BK.LAB Domain"
    credential_type: "Machine"
    organization: "Server Operations"
    inputs:
      username: ansible
      ssh_key_data: "{{ vaulted_controller_credentials_day2___linux_machine___bk_lab_domain_ssh_key_data }}"
  - name: "AAP Credential"
    credential_type: "Red Hat Ansible Automation Platform"
    organization: "SuperAdmin"
    inputs:
      host: production-aap.apps.ocp.bk.lab
      password: "{{ vaulted_controller_credentials_aap_credential_password }}"
      username: casc_service_account
  - name: "CASC - Machine Credential"
    credential_type: "Machine"
    organization: "SuperAdmin"
    inputs:
      username: ansible
      ssh_key_data: "{{ vaulted_controller_credentials_casc___machine_credential_ssh_key_data }}"
  - name: "SuperAdmin Vault"
    credential_type: "Vault"
    organization: "SuperAdmin"
    inputs:
      vault_password: "{{ vaulted_controller_credentials_superadmin_vault_vault_password }}"
  - name: "OCP Virt Credential"
    credential_type: "OpenShift or Kubernetes API Bearer Token"
    organization: "Virtualization Operations"
    inputs:
      host: https://api.ocp.bk.lab:6443
      bearer_token: "{{ vaulted_controller_credentials_ocp_virt_credential_bearer_token }}"
  - name: "VIRT - Vault"
    credential_type: "Vault"
    organization: "Virtualization Operations"
    inputs:
      vault_password: "{{ vaulted_controller_credentials_virt___vault_vault_password }}"
...
