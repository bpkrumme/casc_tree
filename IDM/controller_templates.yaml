---
controller_templates:
  - name: "IDM - Delete host from BK.LAB"
    organization: "IDM Operations"
    project: "IDM Operations"
    inventory: "IDM Operations Inventory"
    playbook: "playbooks/delete_idm_host.yml"
    job_type: "run"
    credentials:
      - "IDM Operations Admin Credential"
      - "IDM Operations Machine Credential"
    execution_environment: "IDM Operations EE"
    survey_enabled: true
    survey_spec:
      name: ""
      spec:
        - max: 1024
          min: 0
          type: text
          required: True
          variable: vm_name
          new_question: False
          question_name: "Which host needs to be deleted?"
      description: ""
  - name: "IDM - Join Domain"
    organization: "IDM Operations"
    project: "IDM Operations"
    inventory: "Master Inventory"
    playbook: "playbooks/join_idm_domain.yml"
    job_type: "run"
    credentials:
      - "DAY1 - Linux Machine - No Domain"
    execution_environment: "IDM Operations EE"
    host_config_key: ""
    survey_enabled: true
    survey_spec:
      name: ""
      spec:
        - max: 1024
          min: 0
          type: text
          required: True
          variable: vm_name
          new_question: False
          question_name: "VM Name"
      description: ""
    become_enabled: true
  - name: "IDM - Unjoin Domain"
    organization: "IDM Operations"
    project: "IDM Operations"
    inventory: "Master Inventory"
    playbook: "playbooks/leave_idm_domain.yml"
    job_type: "run"
    credentials:
      - "DAY1 - Linux Machine - No Domain"
    execution_environment: "IDM Operations EE"
    survey_enabled: true
    survey_spec:
      name: ""
      spec:
        - max: 1024
          min: 0
          type: text
          required: True
          variable: vm_name
          new_question: False
          question_name: "VM Name"
      description: ""
    become_enabled: true
...