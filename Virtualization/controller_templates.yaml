    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_variables_on_launch: false
    ask_inventory_on_launch: false
    ask_limit_on_launch: false
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    extra_vars: ""
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    execution_environment: "OCP Virtualization EE"
    host_config_key: ""
    survey_enabled: true
    survey_spec:
      name: ""
      spec:
        - max: 1024
          min: 0
          type: text
          required: True
          variable: vm_name
          new_question: False
          question_name: "{%- raw -%}What is the name of the virtual machine?{%- endraw -%}"
          question_description: "{%- raw -%}Please use the FQDN of the machine here{%- endraw -%}"
        - max: 1024
          min: 0
          type: text
          default: "{%- raw -%}bklab-vms{%- endraw -%}"
          required: True
          variable: virt_ops_vm_namespace
          new_question: False
          question_name: "{%- raw -%}Which OpenShift namespace is the VM?{%- endraw -%}"
          question_description: "{%- raw -%}This namespace needs to exist prior to provisioning.{%- endraw -%}"
      description: ""
    become_enabled: false
    diff_mode: false
    webhook_service: ""
    prevent_instance_group_fallback: false
  - name: "VIRT - Pause for VM to become available"
    organization: "Virtualization Operations"
    project: "Virtualization Operations"
    inventory: "Localhost"
    playbook: "playbooks/pause.yml"
    scm_branch: ""
    forks: 0
    limit: ""
    verbosity: 0
    job_type: "run"
    job_slice_count: 1
    use_fact_cache: false
    allow_simultaneous: false
    ask_scm_branch_on_launch: false
    ask_diff_mode_on_launch: false
    ask_tags_on_launch: false
    ask_skip_tags_on_launch: false
    ask_job_type_on_launch: false
    ask_verbosity_on_launch: false
    ask_variables_on_launch: false
    ask_inventory_on_launch: false
    ask_limit_on_launch: false
    ask_credential_on_launch: false
    ask_execution_environment_on_launch: false
    ask_labels_on_launch: false
    ask_forks_on_launch: false
    ask_job_slice_count_on_launch: false
    ask_timeout_on_launch: false
    ask_instance_groups_on_launch: false
    extra_vars: ""
    job_tags: ""
    force_handlers: false
    skip_tags: ""
    start_at_task: ""
    timeout: 0
    execution_environment: "OCP Virtualization EE"
    host_config_key: ""
    survey_enabled: true
    survey_spec:
      name: ""
      spec:
        - max: 300
          min: 30
          type: integer
          default: 60
          required: True
          variable: virt_pause_time
          new_question: True
          question_name: "{%- raw -%}How long should we pause?{%- endraw -%}"
      description: ""
    become_enabled: false
    diff_mode: false
    webhook_service: ""
    prevent_instance_group_fallback: false
